<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Generator | Text to MP3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Consolas', monospace;
      background: #d4d4d4;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.2s;
    }

    body.dark {
      background: #1a1a1a;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #f0f0f0;
      border: 2px solid #888;
      padding: 24px;
      box-shadow: 4px 4px 0 #666;
    }

    body.dark .container {
      background: #2d2d2d;
      border-color: #555;
      box-shadow: 4px 4px 0 #333;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #aaa;
    }

    body.dark .header {
      border-bottom-color: #555;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #222;
      text-transform: uppercase;
    }

    body.dark h1 {
      color: #ddd;
    }

    .theme-toggle {
      background: #ccc;
      border: 2px solid #666;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 2px 2px 0 #555;
    }

    body.dark .theme-toggle {
      background: #444;
      border-color: #777;
      color: #eee;
      box-shadow: 2px 2px 0 #222;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #888;
      background: #fff;
      font-size: 15px;
      font-family: 'Consolas', monospace;
      min-height: 130px;
      margin-bottom: 20px;
    }

    body.dark textarea {
      background: #1e1e1e;
      border-color: #666;
      color: #ddd;
    }

    .controls-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .control-item {
      flex: 1;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid #888;
      background: #fff;
      font-size: 14px;
    }

    body.dark select, body.dark input {
      background: #1e1e1e;
      border-color: #666;
      color: #ddd;
    }

    .slider-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
    }

    .format-row {
      background: #e4e4e4;
      padding: 10px 15px;
      border: 1px solid #aaa;
      margin-bottom: 15px;
    }

    body.dark .format-row {
      background: #353535;
      border-color: #555;
    }

    .filename-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 24px;
      background: #e4e4e4;
      padding: 10px 15px;
      border: 1px solid #aaa;
    }

    body.dark .filename-row {
      background: #353535;
      border-color: #555;
    }

    .filename-row input {
      flex: 1;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .btn {
      padding: 8px 16px;
      border: 2px solid #777;
      background: #e0e0e0;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #666;
      text-transform: uppercase;
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .btn-primary {
      background: #1e5f9e;
      border-color: #0d2b4a;
      color: white;
    }

    .btn-success {
      background: #2d7a4f;
      border-color: #1b4d31;
      color: white;
    }

    .btn-danger {
      background: #b13e3e;
      border-color: #702727;
      color: white;
    }

    .history-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #aaa;
      background: #f8f8f8;
      padding: 4px;
    }

    body.dark .history-list {
      background: #252525;
      border-color: #555;
    }

    .log-item {
      padding: 8px 12px;
      border-bottom: 1px solid #ccc;
      display: flex;
      gap: 12px;
      font-size: 13px;
      background: #fff;
    }

    body.dark .log-item {
      background: #333;
      border-color: #555;
      color: #ddd;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      background: #333;
      color: white;
      border: 2px solid #111;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>рҹҺҷпёҸ VOICE TO MP3</h1>
      <button class="theme-toggle" id="themeToggle">рҹҢҷ DARK</button>
    </div>

    <textarea id="textInput" placeholder="Nhбәӯp vДғn bбәЈn...">Xin chГ o! ДҗГўy lГ  file MP3 Д‘Ж°б»Јc tбәЎo trб»ұc tiбәҝp tб»« vДғn bбәЈn.</textarea>

    <div class="controls-row">
      <div class="control-item">
        <label>рҹҢҚ NGГ”N NGб»®</label>
        <select id="languageSelect">
          <option value="vi">Tiбәҝng Viб»Үt</option>
          <option value="en">English</option>
          <option value="fr">FranГ§ais</option>
          <option value="ja">ж—Ҙжң¬иӘһ</option>
          <option value="ko">н•ңкөӯм–ҙ</option>
          <option value="zh-CN">дёӯж–Ү</option>
        </select>
      </div>
      <div class="control-item">
        <label>вҡЎ Tб»җC Дҗб»ҳ</label>
        <div class="slider-block">
          <input type="range" id="speedSlider" min="0.5" max="2.0" value="1.0" step="0.1">
          <span id="speedValue">1.0x</span>
        </div>
      </div>
    </div>

    <div class="format-row">
      <label>рҹҺө Дҗб»ҠNH Dбә NG: <strong>MP3</strong> (128kbps) - TбәЎo trб»ұc tiбәҝp khГҙng cбә§n ghi Гўm</label>
    </div>

    <div class="filename-row">
      <label>рҹ’ҫ TГҠN FILE:</label>
      <input type="text" id="filenameInput" value="voice">
      <span>.mp3</span>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" id="previewBtn">в–¶ Nghe thб»ӯ</button>
      <button class="btn btn-success" id="saveMp3Btn">рҹ’ҫ TбәЎo & LЖ°u MP3</button>
      <button class="btn btn-danger" id="stopBtn">вҸ№ Dб»«ng</button>
    </div>

    <div class="history-section">
      <h3>рҹ“Ӣ Lб»ҠCH Sб»¬</h3>
      <div class="history-list" id="historyList">
        <div style="padding:20px;text-align:center;">ChЖ°a cГі file nГ o</div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    class MP3Generator {
      constructor() {
        this.synth = window.speechSynthesis;
        this.history = [];
        this.audioContext = null;
        this.currentSource = null;
        
        this.initElements();
        this.loadHistory();
        this.attachEvents();
        this.initTheme();
      }

      initElements() {
        this.textInput = document.getElementById('textInput');
        this.languageSelect = document.getElementById('languageSelect');
        this.speedSlider = document.getElementById('speedSlider');
        this.speedValue = document.getElementById('speedValue');
        this.filenameInput = document.getElementById('filenameInput');
        this.previewBtn = document.getElementById('previewBtn');
        this.saveMp3Btn = document.getElementById('saveMp3Btn');
        this.stopBtn = document.getElementById('stopBtn');
        this.historyList = document.getElementById('historyList');
        this.notification = document.getElementById('notification');
        this.themeToggle = document.getElementById('themeToggle');
      }

      initTheme() {
        const saved = localStorage.getItem('theme') || 'light';
        if (saved === 'dark') {
          document.body.classList.add('dark');
          this.themeToggle.textContent = 'вҳҖпёҸ LIGHT';
        }
      }

      attachEvents() {
        this.previewBtn.addEventListener('click', () => this.preview());
        this.saveMp3Btn.addEventListener('click', () => this.generateMP3());
        this.stopBtn.addEventListener('click', () => this.stop());
        this.speedSlider.addEventListener('input', () => {
          this.speedValue.textContent = this.speedSlider.value + 'x';
        });
        this.themeToggle.addEventListener('click', () => this.toggleTheme());
      }

      toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        this.themeToggle.textContent = isDark ? 'вҳҖпёҸ LIGHT' : 'рҹҢҷ DARK';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      preview() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('вқҢ Vui lГІng nhбәӯp vДғn bбәЈn', 'error');
          return;
        }

        this.stop();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = this.languageSelect.value;
        utterance.rate = parseFloat(this.speedSlider.value);
        
        const voices = this.synth.getVoices();
        const voice = voices.find(v => v.lang.startsWith(this.languageSelect.value));
        if (voice) utterance.voice = voice;

        this.synth.speak(utterance);
        this.showNotification('рҹҺҷпёҸ Дҗang Д‘б»Қc...', 'info');
      }

      async generateMP3() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('вқҢ Vui lГІng nhбәӯp vДғn bбәЈn', 'error');
          return;
        }

        this.showNotification('рҹ”Ҡ Дҗang tбәЎo file MP3...', 'info');
        
        try {
          // Sб»ӯ dб»Ҙng phЖ°ЖЎng phГЎp tб»•ng hб»Јp giб»Қng nГіi vГ  chuyб»ғn thГ nh MP3
          const mp3Blob = await this.textToMp3(text);
          
          const filename = this.filenameInput.value.trim() || 'voice';
          this.downloadBlob(mp3Blob, `${filename}.mp3`);
          
          this.addToHistory(text);
          this.showNotification('вң… ДҗГЈ tбәЎo vГ  lЖ°u file MP3', 'success');
        } catch (error) {
          console.error('Lб»—i:', error);
          this.showNotification('вқҢ Lб»—i tбәЎo MP3: ' + error.message, 'error');
        }
      }

      async textToMp3(text) {
        // PhЖ°ЖЎng phГЎp: Sб»ӯ dб»Ҙng Web Audio API Д‘б»ғ tбәЎo giб»Қng nГіi tб»•ng hб»Јp
        // Kбәҝt hб»Јp vб»ӣi cГЎc tham sб»‘ formant Д‘б»ғ mГҙ phб»Ҹng giб»Қng nГіi
        
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const sampleRate = 44100;
        const duration = this.estimateDuration(text);
        
        // TбәЎo audio buffer
        const audioBuffer = this.audioContext.createBuffer(1, sampleRate * duration, sampleRate);
        const channelData = audioBuffer.getChannelData(0);
        
        // TбәЎo formant frequencies cho giб»Қng nГіi
        const lang = this.languageSelect.value;
        const speed = parseFloat(this.speedSlider.value);
        
        // TбәЎo tГӯn hiб»Үu giб»Қng nГіi cЖЎ bбәЈn
        const baseFreq = this.getBaseFrequency(lang);
        const formants = this.getFormants(lang);
        
        let time = 0;
        const timeStep = 1 / sampleRate;
        
        // TбәЎo envelope cho tб»«ng Гўm tiбәҝt
        const syllables = this.splitIntoSyllables(text);
        let syllableIndex = 0;
        
        for (let i = 0; i < channelData.length; i++) {
          time = i * timeStep;
          
          // TГӯnh toГЎn vб»Ӣ trГӯ Гўm tiбәҝt
          const syllableProgress = (time / (duration / syllables.length)) % 1;
          const currentSyllable = Math.floor(time / (duration / syllables.length));
          
          if (currentSyllable < syllables.length) {
            // TбәЎo formant synthesis
            let sample = 0;
            
            // CЖЎ bбәЈn (glottal pulse)
            const fundamental = Math.sin(2 * Math.PI * baseFreq * time);
            
            // ThГӘm formants
            formants.forEach((freq, idx) => {
              const amplitude = 0.3 / (idx + 1);
              sample += amplitude * Math.sin(2 * Math.PI * freq * time);
            });
            
            // ThГӘm fundamental
            sample += 0.5 * fundamental;
            
            // Envelope (ADSR Д‘ЖЎn giбәЈn)
            const envelope = this.getEnvelope(syllableProgress);
            sample *= envelope;
            
            // ThГӘm nhiб»…u nhбә№ cho phб»Ҙ Гўm
            if (this.isConsonant(syllables[currentSyllable])) {
              sample += 0.1 * (Math.random() * 2 - 1);
            }
            
            channelData[i] = Math.max(-0.9, Math.min(0.9, sample));
          }
        }
        
        // Chuyб»ғn sang MP3
        const mp3Blob = await this.audioBufferToMp3(audioBuffer);
        await this.audioContext.close();
        
        return mp3Blob;
      }

      getBaseFrequency(lang) {
        const frequencies = {
          vi: 140,  // Tiбәҝng Viб»Үt
          en: 150,  // English
          fr: 145,  // French
          ja: 135,  // Japanese
          ko: 138,  // Korean
          'zh-CN': 142 // Chinese
        };
        return frequencies[lang] || 145;
      }

      getFormants(lang) {
        // Formant frequencies (F1, F2, F3) cho cГЎc nguyГӘn Гўm
        const formantSets = {
          vi: [800, 1200, 2400],   // Tiбәҝng Viб»Үt
          en: [730, 1090, 2440],   // English
          fr: [650, 1150, 2250],   // French
          ja: [750, 1200, 2300],   // Japanese
          ko: [780, 1180, 2350],   // Korean
          'zh-CN': [720, 1120, 2280] // Chinese
        };
        return formantSets[lang] || [730, 1090, 2440];
      }

      estimateDuration(text) {
        // ЖҜб»ӣc tГӯnh thб»қi gian dб»ұa trГӘn sб»‘ kГҪ tб»ұ vГ  tб»‘c Д‘б»ҷ
        const speed = parseFloat(this.speedSlider.value);
        const baseTime = text.length * 0.08; // ~80ms mб»—i kГҪ tб»ұ
        return Math.max(2, baseTime / speed);
      }

      splitIntoSyllables(text) {
        // ДҗЖЎn giбәЈn hГіa: chia thГ nh cГЎc "Гўm tiбәҝt" dб»ұa trГӘn nguyГӘn Гўm
        const vowels = /[aeiouГ ГЎбәЈГЈбәЎДғбәҜбәұбәібәөбә·ГўбәҘбә§бә©бә«бәӯГӘбәҝб»Ғб»ғб»…б»ҮГӯГ¬б»үД©б»ӢГҙб»‘б»“б»•б»—б»ҷЖЎб»ӣб»қб»ҹб»Ўб»ЈГәГ№б»§Е©б»ҘЖ°б»©б»«б»ӯб»Ҝб»ұГҪб»іб»·б»№б»ө]/gi;
        const syllables = [];
        let lastIndex = 0;
        
        const matches = [...text.matchAll(vowels)];
        matches.forEach((match, idx) => {
          const end = idx < matches.length - 1 ? matches[idx + 1].index : text.length;
          syllables.push(text.substring(lastIndex, end));
          lastIndex = end;
        });
        
        if (lastIndex < text.length) {
          syllables.push(text.substring(lastIndex));
        }
        
        return syllables.length > 0 ? syllables : [text];
      }

      isConsonant(syllable) {
        const vowels = /[aeiouГ ГЎбәЈГЈбәЎДғбәҜбәұбәібәөбә·ГўбәҘбә§бә©бә«бәӯГӘбәҝб»Ғб»ғб»…б»ҮГӯГ¬б»үД©б»ӢГҙб»‘б»“б»•б»—б»ҷЖЎб»ӣб»қб»ҹб»Ўб»ЈГәГ№б»§Е©б»ҘЖ°б»©б»«б»ӯб»Ҝб»ұГҪб»іб»·б»№б»ө]/i;
        return !vowels.test(syllable[0]);
      }

      getEnvelope(progress) {
        // ADSR envelope Д‘ЖЎn giбәЈn
        if (progress < 0.1) {
          return progress / 0.1; // Attack
        } else if (progress < 0.4) {
          return 0.8; // Decay/Sustain
        } else if (progress < 0.8) {
          return 0.8; // Sustain
        } else {
          return 0.8 * (1 - (progress - 0.8) / 0.2); // Release
        }
      }

      async audioBufferToMp3(audioBuffer) {
        const samples = audioBuffer.getChannelData(0);
        const mp3encoder = new lamejs.Mp3Encoder(1, audioBuffer.sampleRate, 128);
        const mp3Data = [];
        
        const sampleBlockSize = 1152;
        
        for (let i = 0; i < samples.length; i += sampleBlockSize) {
          const sampleChunk = samples.subarray(i, i + sampleBlockSize);
          const int16Chunk = new Int16Array(sampleChunk.length);
          
          for (let j = 0; j < sampleChunk.length; j++) {
            const s = Math.max(-1, Math.min(1, sampleChunk[j]));
            int16Chunk[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          
          const mp3buf = mp3encoder.encodeBuffer(int16Chunk);
          if (mp3buf.length > 0) {
            mp3Data.push(mp3buf);
          }
        }
        
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) {
          mp3Data.push(mp3buf);
        }
        
        return new Blob(mp3Data, { type: 'audio/mp3' });
      }

      downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }

      addToHistory(text) {
        const entry = {
          text: text.substring(0, 50) + (text.length > 50 ? '...' : ''),
          time: new Date().toLocaleString('vi-VN')
        };
        
        this.history.unshift(entry);
        if (this.history.length > 20) this.history.pop();
        
        localStorage.setItem('mp3History', JSON.stringify(this.history));
        this.renderHistory();
      }

      loadHistory() {
        try {
          const saved = localStorage.getItem('mp3History');
          if (saved) {
            this.history = JSON.parse(saved);
            this.renderHistory();
          }
        } catch (e) {}
      }

      renderHistory() {
        if (this.history.length === 0) {
          this.historyList.innerHTML = '<div style="padding:20px;text-align:center;">ChЖ°a cГі file nГ o</div>';
          return;
        }
        
        this.historyList.innerHTML = this.history.map(item => `
          <div class="log-item">
            <span>рҹҺө</span>
            <span>${item.text}</span>
            <span style="margin-left:auto;">${item.time}</span>
          </div>
        `).join('');
      }

      stop() {
        if (this.synth) this.synth.cancel();
        if (this.audioContext) this.audioContext.close();
      }

      showNotification(msg, type) {
        this.notification.textContent = msg;
        this.notification.style.background = type === 'success' ? '#2d7a4f' : 
                                            type === 'error' ? '#b13e3e' : '#333';
        this.notification.style.display = 'block';
        setTimeout(() => this.notification.style.display = 'none', 3000);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new MP3Generator();
      if (window.speechSynthesis) speechSynthesis.getVoices();
    });
  </script>
</body>
</html>
