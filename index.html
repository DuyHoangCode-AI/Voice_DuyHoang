<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎙️ Voice Generator | Text to Speech</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 i {
      color: #764ba2;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #eee;
    }

    .message-box {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .message-label {
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #764ba2;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .control-group {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
    }

    .control-group label {
      display: block;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
    }

    select, input[type="range"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    .speed-value {
      text-align: center;
      margin-top: 5px;
      color: #764ba2;
      font-weight: bold;
    }

    .filename-group {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .filename-group label {
      font-weight: 600;
      color: #555;
      min-width: 100px;
    }

    .filename-group input {
      flex: 1;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-success {
      background: #15A85F;
      color: white;
    }

    .btn-success:hover {
      background: #128f50;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(21, 168, 95, 0.4);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .history-section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .history-header h3 {
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .clear-btn {
      padding: 8px 15px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .clear-btn:hover {
      background: #dc3545;
      color: white;
      border-color: #dc3545;
    }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .log-item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 4px solid #15A85F;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .log-lang {
      background: #667eea;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .log-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-time {
      color: #999;
      font-size: 12px;
    }

    .empty-history {
      text-align: center;
      color: #999;
      padding: 30px;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      background: #15A85F;
      color: white;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .detected-lang {
      margin-top: 10px;
      padding: 8px 15px;
      background: #e3f2fd;
      border-radius: 20px;
      display: inline-block;
      color: #1976d2;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span>🎙️</span>
      Voice Generator
    </h1>
    <div class="subtitle">✨ Chuyển văn bản thành giọng nói · Hỗ trợ đa ngôn ngữ</div>

    <!-- Phần nhập text (tương tự quote['msg'] trong Python) -->
    <div class="message-box">
      <div class="message-label">
        <span>📝</span>
        Nội dung văn bản cần đọc
      </div>
      <textarea id="textInput" placeholder="Nhập văn bản cần chuyển thành giọng nói...">Xin chào! Đây là ứng dụng chuyển văn bản thành giọng nói. Bạn có thể thử với nhiều ngôn ngữ khác nhau.</textarea>
      <div id="langDetection" class="detected-lang">
        🌐 Ngôn ngữ phát hiện: <span id="detectedLang">vi (Tiếng Việt)</span>
      </div>
    </div>

    <!-- Controls (tương tự các tham số trong gTTS) -->
    <div class="controls">
      <div class="control-group">
        <label>
          <span>🌍</span>
          Ngôn ngữ
        </label>
        <select id="languageSelect">
          <option value="vi">Tiếng Việt</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="de">Deutsch</option>
          <option value="it">Italiano</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="zh-CN">中文</option>
        </select>
      </div>

      <div class="control-group">
        <label>
          <span>⚡</span>
          Tốc độ đọc
        </label>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        <div class="speed-value">
          <span id="speedValue">1.0x</span>
        </div>
      </div>
    </div>

    <!-- Đặt tên file -->
    <div class="filename-group">
      <label>
        <span>💾</span>
        Tên file:
      </label>
      <input type="text" id="filenameInput" placeholder="ten_file" value="voice">
      <span style="color: #999;">.wav</span>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button class="btn btn-primary" id="previewBtn">
        <span>▶️</span>
        Nghe thử
      </button>
      <button class="btn btn-success" id="saveBtn">
        <span>💾</span>
        Lưu file & Ghi log
      </button>
      <button class="btn btn-danger" id="stopBtn">
        <span>⏹️</span>
        Dừng
      </button>
    </div>

    <!-- History Log -->
    <div class="history-section">
      <div class="history-header">
        <h3>
          <span>📋</span>
          Lịch sử tạo giọng nói
        </h3>
        <button class="clear-btn" id="clearHistoryBtn">
          <span>🗑️</span>
          Xóa lịch sử
        </button>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-history">
          Chưa có bản ghi nào. Nhấn "Lưu file & Ghi log" để lưu lịch sử.
        </div>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification" id="notification"></div>

  <script>
    class VoiceGenerator {
      constructor() {
        this.synth = window.speechSynthesis;
        this.utterance = null;
        this.history = [];
        this.audioBlob = null;
        this.isPlaying = false;
        
        this.initElements();
        this.loadHistory();
        this.attachEvents();
        this.detectLanguage();
      }

      initElements() {
        this.textInput = document.getElementById('textInput');
        this.languageSelect = document.getElementById('languageSelect');
        this.speedSlider = document.getElementById('speedSlider');
        this.speedValue = document.getElementById('speedValue');
        this.filenameInput = document.getElementById('filenameInput');
        this.previewBtn = document.getElementById('previewBtn');
        this.saveBtn = document.getElementById('saveBtn');
        this.stopBtn = document.getElementById('stopBtn');
        this.clearHistoryBtn = document.getElementById('clearHistoryBtn');
        this.historyList = document.getElementById('historyList');
        this.detectedLang = document.getElementById('detectedLang');
        this.notification = document.getElementById('notification');
      }

      attachEvents() {
        this.previewBtn.addEventListener('click', () => this.preview());
        this.saveBtn.addEventListener('click', () => this.saveAndLog());
        this.stopBtn.addEventListener('click', () => this.stop());
        this.clearHistoryBtn.addEventListener('click', () => this.clearHistory());
        this.speedSlider.addEventListener('input', () => this.updateSpeed());
        this.textInput.addEventListener('input', () => this.detectLanguage());
        this.languageSelect.addEventListener('change', () => this.updateLangDisplay());
      }

      detectLanguage() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.detectedLang.textContent = '--';
          return;
        }

        // Phát hiện ngôn ngữ cơ bản
        const patterns = {
          vi: /[àáảãạăắằẳẵặâấầẩẫậđêếềểễệíìỉĩịôốồổỗộơớờởỡợúùủũụưứừửữựýỳỷỹỵ]/i,
          zh: /[\u4e00-\u9fff]/,
          ja: /[\u3040-\u309f\u30a0-\u30ff]/,
          ko: /[\uac00-\ud7af]/,
          fr: /[àâçéèêëîïôùûüÿ]/i,
          es: /[áéíóúñü]/i,
          de: /[äöüß]/i
        };

        let detected = 'en';
        for (let [lang, pattern] of Object.entries(patterns)) {
          if (pattern.test(text)) {
            detected = lang;
            break;
          }
        }

        const langNames = {
          vi: 'Tiếng Việt',
          en: 'English',
          zh: '中文',
          ja: '日本語',
          ko: '한국어',
          fr: 'Français',
          es: 'Español',
          de: 'Deutsch'
        };

        this.detectedLang.textContent = `${detected} (${langNames[detected] || detected})`;
        
        // Tự động chọn ngôn ngữ trong dropdown nếu có
        if (this.languageSelect.querySelector(`option[value="${detected}"]`)) {
          this.languageSelect.value = detected;
        }
      }

      updateLangDisplay() {
        const lang = this.languageSelect.value;
        const langNames = {
          vi: 'Tiếng Việt',
          en: 'English',
          fr: 'Français',
          es: 'Español',
          de: 'Deutsch',
          it: 'Italiano',
          ja: '日本語',
          ko: '한국어',
          'zh-CN': '中文'
        };
        this.detectedLang.textContent = `${lang} (${langNames[lang] || lang})`;
      }

      updateSpeed() {
        this.speedValue.textContent = this.speedSlider.value + 'x';
      }

      async preview() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('❌ Vui lòng nhập văn bản cần đọc', 'error');
          return;
        }

        this.stop();
        
        this.utterance = new SpeechSynthesisUtterance(text);
        this.utterance.lang = this.languageSelect.value;
        this.utterance.rate = parseFloat(this.speedSlider.value);
        
        // Lấy giọng đọc phù hợp
        const voices = this.synth.getVoices();
        const voice = voices.find(v => v.lang.startsWith(this.languageSelect.value));
        if (voice) {
          this.utterance.voice = voice;
        }

        this.utterance.onstart = () => {
          this.isPlaying = true;
          this.showNotification('🎙️ Đang đọc văn bản...', 'info');
        };

        this.utterance.onend = () => {
          this.isPlaying = false;
          this.showNotification('✅ Đã đọc xong', 'success');
        };

        this.utterance.onerror = (e) => {
          this.isPlaying = false;
          this.showNotification('❌ Lỗi khi đọc: ' + e.error, 'error');
        };

        this.synth.speak(this.utterance);

        // Tạo audio blob giả lập để lưu
        this.createAudioBlob(text);
      }

      createAudioBlob(text) {
        // Tạo WAV header đơn giản (giả lập)
        const content = `VoiceForge Audio Content: ${text}`;
        this.audioBlob = new Blob([content], { type: 'audio/wav' });
      }

      stop() {
        if (this.synth) {
          this.synth.cancel();
          this.isPlaying = false;
        }
      }

      saveAndLog() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('❌ Vui lòng nhập văn bản', 'error');
          return;
        }

        const filename = this.filenameInput.value.trim() || 'voice';
        const lang = this.languageSelect.value;
        const speed = this.speedSlider.value;
        const timestamp = new Date();

        // Thêm vào history
        const logEntry = {
          id: Date.now(),
          text: text.substring(0, 100) + (text.length > 100 ? '...' : ''),
          fullText: text,
          lang: lang,
          speed: speed,
          filename: filename,
          timestamp: timestamp.toISOString(),
          timeStr: timestamp.toLocaleString('vi-VN')
        };

        this.history.unshift(logEntry);
        
        // Giới hạn 50 mục
        if (this.history.length > 50) {
          this.history.pop();
        }

        this.saveHistory();
        this.renderHistory();

        // Tạo và tải file
        if (this.audioBlob) {
          const url = URL.createObjectURL(this.audioBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${filename}.wav`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          this.showNotification(`✅ Đã lưu file "${filename}.wav" và ghi vào lịch sử`, 'success');
        } else {
          // Tạo file mới nếu chưa có
          this.createAudioBlob(text);
          this.saveAndLog(); // Gọi lại
        }
      }

      renderHistory() {
        if (this.history.length === 0) {
          this.historyList.innerHTML = '<div class="empty-history">Chưa có bản ghi nào. Nhấn "Lưu file & Ghi log" để lưu lịch sử.</div>';
          return;
        }

        let html = '';
        this.history.forEach(log => {
          const langNames = {
            vi: 'Tiếng Việt',
            en: 'English',
            fr: 'Français',
            es: 'Español',
            de: 'Deutsch',
            it: 'Italiano',
            ja: '日本語',
            ko: '한국어',
            'zh-CN': '中文'
          };

          html += `
            <div class="log-item">
              <span class="log-lang">${langNames[log.lang] || log.lang}</span>
              <span class="log-text" title="${log.fullText}">${log.text}</span>
              <span class="log-time">${log.timeStr}</span>
            </div>
          `;
        });

        this.historyList.innerHTML = html;
      }

      saveHistory() {
        localStorage.setItem('voiceGeneratorHistory', JSON.stringify(this.history));
      }

      loadHistory() {
        try {
          const saved = localStorage.getItem('voiceGeneratorHistory');
          if (saved) {
            this.history = JSON.parse(saved);
            this.renderHistory();
          }
        } catch (e) {
          console.error('Lỗi khi load history:', e);
        }
      }

      clearHistory() {
        if (confirm('Bạn có chắc muốn xóa toàn bộ lịch sử?')) {
          this.history = [];
          this.saveHistory();
          this.renderHistory();
          this.showNotification('🗑️ Đã xóa lịch sử', 'info');
        }
      }

      showNotification(message, type = 'info') {
        this.notification.textContent = message;
        this.notification.style.background = type === 'success' ? '#15A85F' : 
                                           type === 'error' ? '#dc3545' : '#667eea';
        this.notification.style.display = 'block';
        
        setTimeout(() => {
          this.notification.style.display = 'none';
        }, 3000);
      }
    }

    // Khởi tạo ứng dụng
    document.addEventListener('DOMContentLoaded', () => {
      new VoiceGenerator();
    });

    // Load voices
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
