<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Generator | Text to Speech</title>
  <!-- Thư viện lamejs để encode MP3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>
  <style>

    select, input[type="text"] {

    body.dark select, body.dark input[type="text"] {

    #speedValue {

<body>
  <div class="container">
    <div class="header">
      <h1>
        <span>🎙️</span>
        VOICE FORGE
      </h1>
      <button class="theme-toggle" id="themeToggle">🌙 DARK</button>
    </div>
    <div class="subtitle">Chuyển văn bản thành giọng nói · Hỗ trợ WAV & MP3</div>

    <div class="input-section">
      <div class="input-label">
        <span>📝</span> NỘI DUNG VĂN BẢN
      </div>
      <textarea id="textInput" placeholder="Nhập văn bản cần chuyển thành giọng nói...">Xin chào! Đây là Voice Forge. Hãy thử nhập văn bản bằng nhiều ngôn ngữ khác nhau.</textarea>
      <div class="lang-badge">
        <span id="detectedLangDisplay">🌐 vi (Tiếng Việt)</span>
      </div>
    </div>

    <div class="controls-row">
      <div class="control-item">
        <label>🌍 NGÔN NGỮ</label>
        <select id="languageSelect">
          <option value="vi">Tiếng Việt</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="de">Deutsch</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="zh-CN">中文</option>
        </select>
      </div>
      <div class="control-item">
        <label>⚡ TỐC ĐỘ</label>
        <div class="slider-block">
          <input type="range" id="speedSlider" min="0.4" max="2.0" value="1.0" step="0.05">
          <span id="speedValue">1.00x</span>
        </div>
      </div>
    </div>

    <!-- Chọn định dạng -->
    <div class="format-row">
      <label>🎵 ĐỊNH DẠNG:</label>
      <div class="format-options">
        <div class="format-option">
          <input type="radio" name="format" value="wav" id="formatWav" checked>
          <label for="formatWav">WAV (Không nén)</label>
        </div>
        <div class="format-option">
          <input type="radio" name="format" value="mp3" id="formatMp3">
          <label for="formatMp3">MP3 (Nén)</label>
        </div>
      </div>
    </div>

    <div class="filename-row">
      <label>💾 TÊN FILE:</label>
      <input type="text" id="filenameInput" placeholder="voice" value="voice">
      <span class="extension" id="fileExtension">.wav</span>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" id="previewBtn">▶ Nghe thử</button>
      <button class="btn btn-success" id="saveBtn">💾 Lưu file</button>
      <button class="btn btn-warning" id="saveBothBtn">📦 Lưu cả WAV & MP3</button>
      <button class="btn btn-danger" id="stopBtn">⏹ Dừng</button>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h3>📋 LỊCH SỬ TẠO GIỌNG NÓI</h3>
        <button class="clear-btn" id="clearHistoryBtn">🗑 XÓA</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-log">Chưa có bản ghi nào. Nhấn "Lưu file" để lưu.</div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    class VoiceGenerator {
      constructor() {
        this.synth = window.speechSynthesis;
        this.utterance = null;
        this.history = [];
        this.audioBlob = null;
        this.isRecording = false;
        this.mediaRecorder = null;
        this.audioChunks = [];
        this.audioContext = null;
        this.mediaStream = null;
        this.currentFormat = 'wav';
        
        this.initElements();
        this.loadHistory();
        this.attachEvents();
        this.detectLanguage();
        this.initTheme();
      }

      initElements() {
        this.textInput = document.getElementById('textInput');
        this.languageSelect = document.getElementById('languageSelect');
        this.speedSlider = document.getElementById('speedSlider');
        this.speedValue = document.getElementById('speedValue');
        this.filenameInput = document.getElementById('filenameInput');
        this.previewBtn = document.getElementById('previewBtn');
        this.saveBtn = document.getElementById('saveBtn');
        this.saveBothBtn = document.getElementById('saveBothBtn');
        this.stopBtn = document.getElementById('stopBtn');
        this.clearHistoryBtn = document.getElementById('clearHistoryBtn');
        this.historyList = document.getElementById('historyList');
        this.detectedLangDisplay = document.getElementById('detectedLangDisplay');
        this.notification = document.getElementById('notification');
        this.themeToggle = document.getElementById('themeToggle');
        this.formatWav = document.getElementById('formatWav');
        this.formatMp3 = document.getElementById('formatMp3');
        this.fileExtension = document.getElementById('fileExtension');
      }

      initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
          document.body.classList.add('dark');
          this.themeToggle.textContent = '☀️ LIGHT';
        }
      }

      attachEvents() {
        this.previewBtn.addEventListener('click', () => this.preview());
        this.saveBtn.addEventListener('click', () => this.saveAudio());
        this.saveBothBtn.addEventListener('click', () => this.saveBothFormats());
        this.stopBtn.addEventListener('click', () => this.stop());
        this.clearHistoryBtn.addEventListener('click', () => this.clearHistory());
        this.speedSlider.addEventListener('input', () => this.updateSpeed());
        this.textInput.addEventListener('input', () => this.detectLanguage());
        this.languageSelect.addEventListener('change', () => this.updateLangDisplay());
        this.themeToggle.addEventListener('click', () => this.toggleTheme());
        
        this.formatWav.addEventListener('change', (e) => {
          if (e.target.checked) {
            this.currentFormat = 'wav';
            this.fileExtension.textContent = '.wav';
          }
        });
        
        this.formatMp3.addEventListener('change', (e) => {
          if (e.target.checked) {
            this.currentFormat = 'mp3';
            this.fileExtension.textContent = '.mp3';
          }
        });
      }

      toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        this.themeToggle.textContent = isDark ? '☀️ LIGHT' : '🌙 DARK';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      detectLanguage() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.detectedLangDisplay.textContent = '🌐 --';
          return;
        }

        const patterns = {
          vi: /[àáảãạăắằẳẵặâấầẩẫậđêếềểễệíìỉĩịôốồổỗộơớờởỡợúùủũụưứừửữựýỳỷỹỵ]/i,
          zh: /[\u4e00-\u9fff]/,
          ja: /[\u3040-\u309f\u30a0-\u30ff]/,
          ko: /[\uac00-\ud7af]/,
          fr: /[àâçéèêëîïôùûüÿ]/i,
          es: /[áéíóúñü]/i,
          de: /[äöüß]/i
        };

        let detected = 'en';
        for (let [lang, pattern] of Object.entries(patterns)) {
          if (pattern.test(text)) {
            detected = lang;
            break;
          }
        }

        const langNames = {
          vi: 'Tiếng Việt', en: 'English', zh: '中文',
          ja: '日本語', ko: '한국어', fr: 'Français',
          es: 'Español', de: 'Deutsch'
        };

        this.detectedLangDisplay.textContent = `🌐 ${detected} (${langNames[detected] || detected})`;
        
        if (this.languageSelect.querySelector(`option[value="${detected}"]`)) {
          this.languageSelect.value = detected;
        }
      }

      updateLangDisplay() {
        const lang = this.languageSelect.value;
        const langNames = {
          vi: 'Tiếng Việt', en: 'English', fr: 'Français', 
          es: 'Español', de: 'Deutsch', it: 'Italiano',
          ja: '日本語', ko: '한국어', 'zh-CN': '中文'
        };
        this.detectedLangDisplay.textContent = `🌐 ${lang} (${langNames[lang] || lang})`;
      }

      updateSpeed() {
        this.speedValue.textContent = this.speedSlider.value + 'x';
      }

      async startRecording() {
        try {
          this.mediaStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { sampleRate: 44100, channelCount: 1 } 
          });
          this.mediaRecorder = new MediaRecorder(this.mediaStream);
          this.audioChunks = [];

          this.mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              this.audioChunks.push(event.data);
            }
          };

          this.mediaRecorder.start();
          this.isRecording = true;
        } catch (error) {
          console.error('Lỗi ghi âm:', error);
          this.showNotification('❌ Không thể truy cập microphone', 'error');
        }
      }

      stopRecording() {
        return new Promise((resolve) => {
          if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
            this.mediaRecorder.onstop = async () => {
              const webmBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
              
              if (this.mediaStream) {
                this.mediaStream.getTracks().forEach(track => track.stop());
              }
              
              this.isRecording = false;
              resolve(webmBlob);
            };
            this.mediaRecorder.stop();
          } else {
            resolve(null);
          }
        });
      }

      async webmToWav(webmBlob) {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await webmBlob.arrayBuffer();
        const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
        
        const wavBlob = this.audioBufferToWav(audioBuffer);
        await this.audioContext.close();
        return wavBlob;
      }

      async webmToMp3(webmBlob) {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await webmBlob.arrayBuffer();
        const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
        
        const mp3Blob = await this.audioBufferToMp3(audioBuffer);
        await this.audioContext.close();
        return mp3Blob;
      }

      audioBufferToWav(audioBuffer) {
        const numChannels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const format = 1;
        const bitDepth = 16;
        
        const bytesPerSample = bitDepth / 8;
        const blockAlign = numChannels * bytesPerSample;
        
        const samples = audioBuffer.getChannelData(0);
        const intSamples = new Int16Array(samples.length);
        
        for (let i = 0; i < samples.length; i++) {
          const s = Math.max(-1, Math.min(1, samples[i]));
          intSamples[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        
        const dataSize = intSamples.length * bytesPerSample;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);
        
        this.writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        this.writeString(view, 8, 'WAVE');
        this.writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitDepth, true);
        this.writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);
        
        let offset = 44;
        for (let i = 0; i < intSamples.length; i++) {
          view.setInt16(offset, intSamples[i], true);
          offset += 2;
        }
        
        return new Blob([buffer], { type: 'audio/wav' });
      }

      async audioBufferToMp3(audioBuffer) {
        const samples = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        
        const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
        const mp3Data = [];
        
        const sampleBlockSize = 1152;
        
        for (let i = 0; i < samples.length; i += sampleBlockSize) {
          const sampleChunk = samples.subarray(i, i + sampleBlockSize);
          const int16Chunk = new Int16Array(sampleChunk.length);
          
          for (let j = 0; j < sampleChunk.length; j++) {
            const s = Math.max(-1, Math.min(1, sampleChunk[j]));
            int16Chunk[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          
          const mp3buf = mp3encoder.encodeBuffer(int16Chunk);
          if (mp3buf.length > 0) {
            mp3Data.push(mp3buf);
          }
        }
        
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) {
          mp3Data.push(mp3buf);
        }
        
        return new Blob(mp3Data, { type: 'audio/mp3' });
      }

      writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }

      downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      async preview() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('❌ Vui lòng nhập văn bản', 'error');
          return;
        }

        this.stop();
        
        this.utterance = new SpeechSynthesisUtterance(text);
        this.utterance.lang = this.languageSelect.value;
        this.utterance.rate = parseFloat(this.speedSlider.value);
        
        const voices = this.synth.getVoices();
        const voice = voices.find(v => v.lang.startsWith(this.languageSelect.value));
        if (voice) this.utterance.voice = voice;

        this.utterance.onstart = () => {
          this.showNotification('🎙️ Đang đọc...', 'info');
        };

        this.utterance.onend = () => {
          this.showNotification('✅ Đã đọc xong', 'success');
        };

        this.synth.speak(this.utterance);
      }

      async saveAudio() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('❌ Vui lòng nhập văn bản', 'error');
          return;
        }

        const filename = this.filenameInput.value.trim() || 'voice';
        const lang = this.languageSelect.value;
        const speed = this.speedSlider.value;
        const format = this.currentFormat;
        const timestamp = new Date();

        this.showNotification(`🎙️ Đang ghi âm (${format.toUpperCase()})...`, 'info');
        
        await this.startRecording();
        
        this.stop();
        this.utterance = new SpeechSynthesisUtterance(text);
        this.utterance.lang = lang;
        this.utterance.rate = parseFloat(speed);
        
        const voices = this.synth.getVoices();
        const voice = voices.find(v => v.lang.startsWith(lang));
        if (voice) this.utterance.voice = voice;

        this.utterance.onend = async () => {
          setTimeout(async () => {
            const webmBlob = await this.stopRecording();
            
            if (webmBlob) {
              let finalBlob;
              if (format === 'mp3') {
                finalBlob = await this.webmToMp3(webmBlob);
              } else {
                finalBlob = await this.webmToWav(webmBlob);
              }
              
              this.downloadBlob(finalBlob, `${filename}.${format}`);
              
              this.addToHistory(text, lang, speed, filename, format, timestamp);
              this.showNotification(`✅ Đã lưu "${filename}.${format}"`, 'success');
            }
          }, 500);
        };

        this.synth.speak(this.utterance);
      }

      async saveBothFormats() {
        const text = this.textInput.value.trim();
        if (!text) {
          this.showNotification('❌ Vui lòng nhập văn bản', 'error');
          return;
        }

        const filename = this.filenameInput.value.trim() || 'voice';
        const lang = this.languageSelect.value;
        const speed = this.speedSlider.value;
        const timestamp = new Date();

        this.showNotification('🎙️ Đang ghi âm (WAV & MP3)...', 'info');
        
        await this.startRecording();
        
        this.stop();
        this.utterance = new SpeechSynthesisUtterance(text);
        this.utterance.lang = lang;
        this.utterance.rate = parseFloat(speed);
        
        const voices = this.synth.getVoices();
        const voice = voices.find(v => v.lang.startsWith(lang));
        if (voice) this.utterance.voice = voice;

        this.utterance.onend = async () => {
          setTimeout(async () => {
            const webmBlob = await this.stopRecording();
            
            if (webmBlob) {
              const wavBlob = await this.webmToWav(webmBlob);
              const mp3Blob = await this.webmToMp3(webmBlob);
              
              this.downloadBlob(wavBlob, `${filename}.wav`);
              setTimeout(() => {
                this.downloadBlob(mp3Blob, `${filename}.mp3`);
              }, 100);
              
              this.addToHistory(text, lang, speed, filename, 'WAV+MP3', timestamp);
              this.showNotification(`✅ Đã lưu "${filename}.wav" và "${filename}.mp3"`, 'success');
            }
          }, 500);
        };

        this.synth.speak(this.utterance);
      }

      addToHistory(text, lang, speed, filename, format, timestamp) {
        const logEntry = {
          id: Date.now(),
          text: text.substring(0, 80) + (text.length > 80 ? '...' : ''),
          fullText: text,
          lang: lang,
          speed: speed,
          filename: filename,
          format: format,
          timestamp: timestamp.toISOString(),
          timeStr: timestamp.toLocaleString('vi-VN')
        };

        this.history.unshift(logEntry);
        if (this.history.length > 50) this.history.pop();
        this.saveHistory();
        this.renderHistory();
      }

      stop() {
        if (this.synth) {
          this.synth.cancel();
        }
        if (this.isRecording) {
          this.stopRecording();
        }
      }

      renderHistory() {
        if (this.history.length === 0) {
          this.historyList.innerHTML = '<div class="empty-log">Chưa có bản ghi nào. Nhấn "Lưu file" để lưu.</div>';
          return;
        }

        let html = '';
        this.history.forEach(log => {
          const langNames = {
            vi: 'Tiếng Việt', en: 'English', fr: 'Français',
            es: 'Español', de: 'Deutsch', ja: '日本語',
            ko: '한국어', 'zh-CN': '中文'
          };

          html += `
            <div class="log-item">
              <span class="log-lang">${langNames[log.lang] || log.lang}</span>
              <span class="log-format">${log.format}</span>
              <span class="log-text" title="${log.fullText}">${log.text}</span>
              <span class="log-time">${log.timeStr}</span>
            </div>
          `;
        });

        this.historyList.innerHTML = html;
      }

      saveHistory() {
        localStorage.setItem('voiceGeneratorHistory', JSON.stringify(this.history));
      }

      loadHistory() {
        try {
          const saved = localStorage.getItem('voiceGeneratorHistory');
          if (saved) {
            this.history = JSON.parse(saved);
            this.renderHistory();
          }
        } catch (e) {
          console.error('Lỗi load history:', e);
        }
      }

      clearHistory() {
        if (confirm('Xóa toàn bộ lịch sử?')) {
          this.history = [];
          this.saveHistory();
          this.renderHistory();
          this.showNotification('🗑 Đã xóa lịch sử', 'info');
        }
      }

      showNotification(message, type = 'info') {
        this.notification.textContent = message;
        this.notification.style.background = type === 'success' ? '#2d7a4f' : 
                                           type === 'error' ? '#b13e3e' : '#333';
        this.notification.style.display = 'block';
        
        setTimeout(() => {
          this.notification.style.display = 'none';
        }, 3000);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new VoiceGenerator();
      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
      }
    });
  </script>
</body>
